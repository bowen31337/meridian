[tool.uv]
package = false

[tool.uv.workspace]
members = [
    "apps/meridiand",
    "apps/meridian-cli",
    "packages/api-capabilities",
    "packages/api-models",
    "packages/builtin-tools",
    "packages/core-errors",
    "packages/knowledge-base-indexer",
    "packages/plugin-loader",
    "packages/sdk-capabilities",
    "packages/sdk-channel",
    "packages/sdk-environment",
    "packages/sdk-provider",
    "packages/sdk-sandbox",
    "packages/sdk-tool",
    "packages/storage-blob",
    "packages/storage-event-log",
    "packages/storage-reposit",
    "packages/storage-repository",
    "packages/sdk-py",
    "packages/system-ulid",
]

[dependency-groups]
dev = [
    "ruff>=0.9.7",
    "pyright>=1.1.400",
    "pytest>=8",
    "pytest-asyncio>=0.23",
    "import-linter>=2.1",
    "opentelemetry-sdk>=1.24",
    "opentelemetry-api>=1.24",
    "fastapi>=0.110",
    "httpx>=0.27",
    "uvicorn[standard]>=0.29",
    "pyyaml>=6.0",
    "anyio>=4.0",
    "pydantic>=2.0",
    "jsonschema>=4.0",
    "watchdog>=3.0",
    "tree-sitter>=0.21",
    "aiosqlite>=0.19",
    "sqlite-vec>=0.1.6",
    "asyncpg>=0.29",
    "click>=8.0",
    "sqlean-py>=3.50.4.5",
    "datamodel-code-generator>=0.26",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = [
    "apps/meridiand/tests",
    "apps/meridian-cli/tests",
    "packages/api-capabilities/tests",
    "packages/api-models/tests",
    "packages/builtin-tools/tests",
    "packages/core-errors/tests",
    "packages/knowledge-base-indexer/tests",
    "packages/plugin-loader/tests",
    "packages/sdk-capabilities/tests",
    "packages/sdk-channel/tests",
    "packages/sdk-environment/tests",
    "packages/sdk-provider/tests",
    "packages/sdk-sandbox/tests",
    "packages/sdk-tool/tests",
    "packages/storage-blob/tests",
    "packages/storage-event-log/tests",
    "packages/storage-reposit/tests",
    "packages/storage-repository/tests",
    "packages/system-ulid/tests",
]
