[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "meridian-api-capabilities"
version = "0.1.0"
description = "REST API for Meridian capability declarations and plugin namespace registration"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.0",
    "fastapi>=0.110",
    "opentelemetry-api>=1.24",
    "meridian-core-errors",
    "meridian-sdk-capabilities",
]

[tool.uv.sources]
meridian-core-errors = { workspace = true }
meridian-sdk-capabilities = { workspace = true }

[project.optional-dependencies]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.23",
    "httpx>=0.27",
    "opentelemetry-sdk>=1.24",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
pythonpath = ["src"]
