[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "meridian-storage-reposit"
version = "0.1.0"
description = "Background indexer: reads new events from the NDJSON event log and updates SQLite projection rows"
requires-python = ">=3.11"
dependencies = [
    "opentelemetry-api>=1.24",
    "meridian-storage-event-log",
]

[project.optional-dependencies]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.23",
    "opentelemetry-sdk>=1.24",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
pythonpath = ["src"]
