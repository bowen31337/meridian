[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "meridian-kb-indexer"
version = "0.1.0"
description = "Meridian Workspace Indexer — watches $WORKSPACE via fsevents/inotify, chunks code with tree-sitter, and chunks markdown/text by heading boundaries"
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = [
    "pydantic>=2.0",
    "opentelemetry-api>=1.24.0",
    "watchdog>=4.0",
    "tree-sitter>=0.22",
    "tree-sitter-python>=0.22",
    "tree-sitter-javascript>=0.22",
    "tree-sitter-typescript>=0.22",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "opentelemetry-sdk>=1.24.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/meridian_kb_indexer"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]

[tool.pyright]
pythonVersion = "3.11"
include = ["src"]
strict = true
