[project]
name = "meridian-sdk-py"
version = "0.1.0"
description = "Meridian Python SDK — generated API types (owned by codegen pipeline)"
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = [
    "pydantic>=2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/meridian_sdk_py"]

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.pyright]
pythonVersion = "3.11"
strict = true
include = ["src"]
