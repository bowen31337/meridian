[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "meridian-plugin-loader"
version = "0.1.0"
description = "Meridian system plugin loader – discovers installed plugins via entry_points and ~/.meridian/plugins.yml"
requires-python = ">=3.11"
dependencies = [
    "pyyaml>=6.0",
    "pydantic>=2.0",
    "opentelemetry-api>=1.24",
    "meridian-core-errors>=0.1.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8",
    "opentelemetry-sdk>=1.24",
]

[tool.uv.sources]
meridian-core-errors = { workspace = true }

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
pythonpath = [
    "src",
    "../../packages/core-errors/src",
]
