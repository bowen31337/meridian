[project]
name = "meridian-builtin-tools"
version = "0.1.0"
description = "Meridian system built-in tools — pre-registered tools shipped with the platform (canvas_op and others)"
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = [
    "meridian-sdk-tool>=0.1.0",
    "pydantic>=2.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-anyio>=0.0.0",
    "anyio[trio]",
    "opentelemetry-api>=1.24",
    "opentelemetry-sdk>=1.24",
    "pyright>=1.1",
    "ruff>=0.4",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/meridian_builtin_tools"]

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "W", "F", "I", "UP", "B", "SIM", "TCH"]
ignore = ["B008"]

[tool.pyright]
pythonVersion = "3.11"
strict = true
include = ["src"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
