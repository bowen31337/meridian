[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "meridian-sdk-budget"
version = "0.1.0"
description = "Budget enforcement with hard and soft thresholds across token/cost/time dimensions"
requires-python = ">=3.11"
dependencies = [
    "meridian-core-errors>=0.1.0",
    "opentelemetry-api>=1.24",
]

[project.optional-dependencies]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.23",
    "opentelemetry-sdk>=1.24",
]

[tool.uv.sources]
meridian-core-errors = { workspace = true }

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
"*" = ["py.typed"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
pythonpath = ["src"]
