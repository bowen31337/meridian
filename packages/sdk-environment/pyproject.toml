[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "meridian-sdk-environment"
version = "0.1.0"
description = "System Environment Backend SDK for Meridian"
requires-python = ">=3.11"
dependencies = [
    "opentelemetry-api>=1.24",
]

[project.optional-dependencies]
http = [
    "httpx>=0.27",
]
ssh = [
    "asyncssh>=2.14",
]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.23",
    "opentelemetry-sdk>=1.24",
    "httpx>=0.27",
    "asyncssh>=2.14",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
"*" = ["py.typed"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
pythonpath = ["src"]
