[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "meridian-storage-repository"
version = "0.1.0"
description = "System repository interfaces with SQLite and Postgres implementations for Meridian"
requires-python = ">=3.11"
dependencies = [
    "opentelemetry-api>=1.24",
]

[project.optional-dependencies]
sqlite = ["aiosqlite>=0.19", "sqlite-vec>=0.1.6"]
postgres = ["asyncpg>=0.29"]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.23",
    "opentelemetry-sdk>=1.24",
    "aiosqlite>=0.19",
    "sqlite-vec>=0.1.6",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
"storage_repository" = ["db/migrations/*.sql"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
pythonpath = ["src"]
