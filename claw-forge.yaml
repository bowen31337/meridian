# claw-forge configuration — generated by `claw-forge init`
# Edit providers below, then copy .env.example → .env and fill in your keys.

model_aliases:
  opus:   ${MODEL_OPUS:-claude-opus-4-6}
  sonnet: ${MODEL_SONNET:-claude-sonnet-4-6}
  haiku:  ${MODEL_HAIKU:-claude-haiku-4-6}
  fast:   ${MODEL_FAST:-claude-haiku-4-6}

pool:
  # Provider routing strategy when more than one provider is configured
  # in ``providers:`` below.  Pick one of:
  #   round_robin     — (default) rotate through enabled providers in
  #                     order; each request advances a cursor by one.
  #                     Best when providers have similar latency / cost
  #                     profiles (e.g. several proxy keys for the same
  #                     upstream); evens out load and bypasses circuit-
  #                     open providers automatically.
  #   priority        — always prefer the highest-priority provider
  #                     (lowest ``priority:`` integer wins); only fall
  #                     through when its CircuitBreaker opens.  Use when
  #                     one provider is clearly preferable (cheaper,
  #                     faster, or your "primary") and others are
  #                     standby fallbacks.
  #   weighted_random — random pick weighted by each provider's
  #                     ``priority:`` field.  Use for stochastic load
  #                     balancing without strict round-robin order.
  #   least_cost      — prefer the provider with the lowest tracked
  #                     cost-per-token observed in the current session.
  #                     Cold-start picks by configured priority.
  #   least_latency   — prefer the provider with the lowest p50 latency
  #                     observed in the current session.  Cold-start
  #                     picks by configured priority.
  strategy: round_robin
  # CircuitBreaker tuning — opens a provider's breaker after this many
  # consecutive failures (rate-limit, network error, 5xx).  Once open,
  # the router skips this provider until ``recovery_timeout`` elapses.
  failure_threshold: 5
  # Per-request retry attempts before falling through to the next
  # provider in the rotation.  Total fallback attempts across the pool
  # = max_retries × len(providers).
  max_retries: 3
  # Seconds to wait before re-probing a provider whose CircuitBreaker
  # opened.  Lower this for chatty debugging; raise it for flaky
  # upstreams that need longer to recover.
  recovery_timeout: 60

providers:
  # Claude OAuth — run `claude setup-token` once, paste token into .en
  claude-oauth-1:
    enabled: true
    oauth_token: ${OAUTH_TOKEN_A}
    priority: 1
    type: anthropic_oauth
  claude-oauth-2:
    enabled: true
    oauth_token: ${OAUTH_TOKEN_B}
    priority: 1
    type: anthropic_oauth
  # Anthropic-compatible proxy (optional)
  # anthropic-proxy:
  #   type: anthropic_compat
  #   api_key: ${PROXY_API_KEY}
  #   base_url: ${PROXY_BASE_URL}
  #   model: ${PROXY_MODEL}
  #   priority: 3
  #   enabled: true

  # Local Ollama (optional, free)
  # local-ollama:
  #   type: ollama
  #   base_url: http://localhost:11434
  #   model: qwen2.5:32b
  #   priority: 10
  #   enabled: true

agent:
  default_model: ${MODEL_DEFAULT:-claude-sonnet-4-6}
  plan_model: null  # separate model for planning phase (e.g. claude-opus-4-6)
  max_tokens: 8192
  max_concurrent_agents: 5
  # Edit tool mode for agent file operations.
  # ``hashline`` (default): content-addressed line tagging — fewer
  # ambiguous-match edit failures on long files; auto-raises the
  # dispatcher's failure-retry threshold by 3 (e.g. 5 → 8).
  # ``str_replace``: legacy exact-text matching.  Override per-run with
  # ``claw-forge run --edit-mode <mode>``.
  edit_mode: hashline    # hashline | str_replace
  # Per-agent isolation mode — defends against the agent writing files
  # outside its assigned worktree (the v0.8.14/15 leak class).  See
  # CLAUDE.md → "Worktree-Leakage Defenses" for the full layered design.
  #
  # ``sandbox`` (default, v0.8.18 → v0.8.21): OS-level filesystem jail
  #     per agent process.
  #     - macOS: wraps the ``claude`` CLI in ``sandbox-exec`` so writes
  #       outside the worktree return ``EACCES``.
  #     - Linux (v0.8.21+): wraps the ``claude`` CLI in ``bwrap``
  #       (bubblewrap) so writes outside the worktree fail at
  #       ``open(2)``.  Requires ``bwrap`` on PATH.
  #     - Other OSes (Windows, BSD): falls back to the behavioural-only
  #       stack (Layers 1–3 + snapshot-rollback) with a logged warning.
  #
  # ``container`` (v0.8.19): per-agent Docker/Podman container with the
  #     worktree mounted at ``/workspace`` and the parent project absent
  #     from the container's filesystem namespace.  Strongest isolation
  #     — escapes return ``ENOENT`` rather than ``EACCES``.  Opt-in
  #     because it requires a container runtime + an operator-built
  #     image (Dockerfile template in docs/container-isolation.md) +
  #     adds ~1–3s per-task startup latency.  Right for security-
  #     sensitive deployments, untrusted prompts, multi-tenant hosts,
  #     and CI pipelines.  Set ``agent.container.image`` when using
  #     this mode; see docs/container-isolation.md for full config.
  #
  # ``process`` (deprecated alias for ``sandbox``, kept for backward
  #     compat with v0.8.18 → v0.8.20 configs).
  isolation: sandbox     # sandbox | container | process (alias)
  # container:
  #   runtime: auto              # docker | podman | auto
  #   image: my-claw-forge-agent
  #   pull_if_missing: false     # opt-in to auto-pull from registry
  #   extra_mounts: []
  #   extra_env: []

skills:
  - pyright
  - typescript-lsp
  - rust-analyzer
  - systematic-debug
  - git-workflow

state:
  # database_url: postgresql+asyncpg://user:pass@localhost:5432/claw_forge
  # database_url: sqlite+aiosqlite:///path/to/state.db  # (default)
  host: "0.0.0.0"
  port: 8420

git:
  enabled: true
  merge_strategy: auto    # auto | manual
  branch_prefix: feat
  target_branch: main
  commit_on_plugin_boundary: true
  # Smart-mode startup cleanup: walk .claw-forge/worktrees/ at startup and
  # preserve/salvage/remove per task state in the DB.  See docs/commands.md
  # for the full decision matrix.  ``smart`` (default) prevents stale
  # worktrees from accumulating across runs; ``manual`` falls back to the
  # legacy ``orphans_reset > 0`` gate that only fires after an interrupted
  # run.  Smart mode is a no-op when ``merge_strategy: manual``.
  cleanup_orphan_worktrees: smart     # smart | manual
  # When smart-mode salvage hits a real merge conflict, drafts
  # CONFLICT_PROPOSAL.md inside the preserved worktree via claude_agent_sdk.
  # Advisory only — never lands on main; the user reviews and applies.
  # On by default — conflicts are rare, and when they happen having a
  # ready-to-review proposal beats reasoning from scratch.  Costs one
  # agent call per conflict.  Set to false to disable if you'd rather
  # resolve conflicts by hand or don't want the API spend.
  llm_conflict_proposals: true        # set to false to disable the advisor
  # After every successful squash-merge, push <target_branch> to its remote.
  # Set to true to use 'origin' (default) or to a remote name string like
  # "upstream" for forks.  No-op merges and missing remotes are silent
  # skips; push failures are warnings, never fail the task.  Off by default.
  push_after_merge: true
  # At ``claw-forge run`` startup, ensure the main worktree is clean
  # (everything committed to HEAD) before any agent worktree branches off.
  # ``smart`` (autonomous): archive untracked files to .claw-forge/orphans/
  # with PROVENANCE.json, stash dirty-tracked state with a marker message
  # — both reversible, no human in the loop.  ``abort`` (fail-fast):
  # refuse to start whenever any uncommitted state exists.  ``ignore``
  # (legacy): handler doesn't run.  Will flip to ``smart`` default next
  # minor.
  handle_uncommitted_at_startup: ignore   # ignore | smart | abort

# Training-trace capture (ON by default for fresh `claw-forge init`).
# claw-forge records every agent message during `claw-forge run` into the
# state.db events table for export-and-fine-tune workflows.
#
# Anthropic's Usage Policies prohibit using Claude outputs to develop models
# that compete with Anthropic's services.  This feature is intended for
# personal/internal distillation on your own code.  Set both flags to false
# to disable recording.  See docs/training/unsloth-recipe.md for the
# export → train → eval flow.
training_traces:
  enabled: true
  acknowledged_terms: true
  redaction:
    secrets: true                 # scrub well-known token / API-key patterns
    usernames: true               # /Users/<you>/ → /Users/<USER>/
    paths: false                  # full path anonymization (signal-destroying; off)
    custom_patterns: []
  retention:
    # 0 = forever; else prune agent_message events older than N days.
    keep_days: 0
    on_state_service_startup: true
