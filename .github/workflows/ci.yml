name: CI

on:
  pull_request:
  push:
    branches: [master]

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: uv lock check
        run: |
          uv lock --check || {
            echo "::error::STAGE FAILED: uv lock check — run 'uv lock' locally and commit uv.lock"
            exit 1
          }

      - name: Install Python dependencies
        run: uv sync --frozen --group dev

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: ruff
        run: |
          bash scripts/check-ruff.sh || {
            echo "::error::STAGE FAILED: ruff — run 'ruff format . && ruff check --fix .' to fix"
            exit 1
          }

      - name: pyright
        run: |
          uv run pyright || {
            echo "::error::STAGE FAILED: pyright — fix type errors shown above"
            exit 1
          }

      - name: lint-imports
        run: |
          uv run lint-imports || {
            echo "::error::STAGE FAILED: lint-imports — fix import boundary violations shown above"
            exit 1
          }

      - name: agent-sdk-imports
        run: |
          uv run python scripts/check-agent-sdk-imports.py || {
            echo "::error::STAGE FAILED: agent-sdk-imports — see docs/ARCHITECTURE.md §13.4 and §13.5 for the provider-isolation rule"
            exit 1
          }

      - name: provider-imports
        run: |
          uv run python scripts/check-provider-imports.py || {
            echo "::error::STAGE FAILED: provider-imports — move provider SDK calls behind the sdk-provider abstraction layer"
            exit 1
          }

      - name: "L6 — sdk-ts guard (no manual edits to generated SDK)"
        run: |
          # Verify no local modifications exist inside the codegen-owned directories.
          # Developers must regenerate via 'make codegen', not hand-edit these files.
          git diff --exit-code packages/sdk-ts/src packages/sdk-py/src 2>/dev/null || {
            echo "::error::STAGE FAILED [L6]: unstaged changes detected in codegen-owned SDK directories."
            echo "::error::Run 'make codegen' to regenerate, then commit. Do not edit sdk-ts/src or sdk-py/src by hand."
            exit 1
          }

      - name: biome check
        run: |
          node_modules/.bin/biome check . || {
            echo "::error::STAGE FAILED: biome check — run 'biome check --write .' to auto-fix"
            exit 1
          }

      - name: "tsc --noEmit"
        run: |
          pnpm -r typecheck || {
            echo "::error::STAGE FAILED: tsc --noEmit — fix TypeScript type errors shown above"
            exit 1
          }

      - name: codegen
        run: |
          uv run python scripts/make_runner.py --target codegen || {
            echo "::error::STAGE FAILED: codegen — fix codegen errors shown above"
            exit 1
          }

      - name: codegen-drift check
        run: |
          DIRS=""
          [ -d packages/sdk-ts/src ] && DIRS="$DIRS packages/sdk-ts/src"
          [ -d packages/sdk-py/src ] && DIRS="$DIRS packages/sdk-py/src"
          if [ -n "$DIRS" ]; then
            # shellcheck disable=SC2086
            git diff --exit-code $DIRS || {
              echo "::error::STAGE FAILED: codegen-drift check — committed SDKs are out of date; run 'make codegen' and commit"
              exit 1
            }
          fi

      - name: pytest
        run: |
          uv run pytest || {
            echo "::error::STAGE FAILED: pytest — fix failing tests shown above"
            exit 1
          }

      - name: vitest
        run: |
          pnpm -r test || {
            echo "::error::STAGE FAILED: vitest — fix failing tests shown above"
            exit 1
          }

      - name: Upload audit log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-audit-log
          path: ci-audit.ndjson
          if-no-files-found: ignore
